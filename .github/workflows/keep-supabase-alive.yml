name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */6 * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/app_users?select=id&limit=1' \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
        
      - name: Log Success
        run: echo "Successfully pinged Supabase at $(date)"
